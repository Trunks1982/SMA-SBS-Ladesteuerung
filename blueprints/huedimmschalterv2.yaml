                    continue_on_timeout: true
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is not none }}"
                        sequence: !input button_3_triple
                    default: !input button_3_double
            default: !input button_3_single
      
      - conditions:
          - condition: trigger
            id: button_3
          - condition: template
