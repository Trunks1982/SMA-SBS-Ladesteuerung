blueprint:
  name: Hue Dimmschalter V2 Steuerung (Test)
  description: |
    Steuert Lichter mit einem Hue Dimmschalter V2.
    
    Events:
    - Short Release: Einzelklick / Doppelklick / Dreifachklick
    - Initial Press / Repeat / Long Press: Dimmen (hoch/runter wechselt)
    - Long Release: Dimmen stoppen
  domain: automation
  input:
    hue_button:
      name: Hue Dimmschalter V2
      description: Der Hue Dimmschalter der die Events sendet
      selector:
        entity:
          filter:
            - domain: event
    
    single_click_action:
      name: Einzelklick - Aktion
      description: Was soll bei einem Klick passieren?
      default: []
      selector:
        action: {}
    
    double_click_action:
      name: Doppelklick - Aktion
      description: Was soll bei Doppelklick passieren?
      default: []
      selector:
        action: {}
    
    triple_click_action:
      name: Dreifachklick - Aktion
      description: Was soll bei Dreifachklick passieren?
      default: []
      selector:
        action: {}
    
    dimmable_lights:
      name: Dimmbare Lampen
      description: Welche Lampen sollen gedimmt werden?
      default: []
      selector:
        entity:
          filter:
            - domain: light
          multiple: true
    
    dim_speed:
      name: Dimm-Geschwindigkeit
      description: Geschwindigkeit beim Dimmen (höher = schneller)
      default: 20
      selector:
        number:
          min: 5
          max: 50
          step: 5
    
    dim_delay:
      name: Dimm-Verzögerung
      description: Verzögerung zwischen Dimm-Schritten in Millisekunden
      default: 150
      selector:
        number:
          min: 50
          max: 500
          step: 50
          unit_of_measurement: "ms"
    
    dim_direction_helper:
      name: Dimm-Richtung Helper
      description: Input Boolean Helper (muss vorher erstellt werden)
      selector:
        entity:
          filter:
            - domain: input_boolean
    
    multi_click_delay:
      name: Mehrfachklick-Zeitfenster
      description: Zeit in Millisekunden für Erkennung von Mehrfachklicks
      default: 400
      selector:
        number:
          min: 200
          max: 800
          step: 50
          unit_of_measurement: "ms"

variables:
  dimmable_lights_list: !input dimmable_lights
  dim_speed_value: !input dim_speed
  event_type: "{{ trigger.to_state.attributes.event_type }}"
  lights_on: "{{ expand(dimmable_lights_list) | selectattr('state', 'eq', 'on') | map(attribute='entity_id') | list }}"

trigger:
  - platform: state
    entity_id: !input hue_button
    attribute: event_type

action:
  - choose:
      # Option 1: Short Release - Mehrfachklick-Erkennung
      - conditions:
          - condition: template
            value_template: "{{ event_type == 'short_release' }}"
        sequence:
          # Warte auf zweiten Klick
          - wait_for_trigger:
              - platform: state
                entity_id: !input hue_button
                attribute: event_type
                to: "short_release"
            timeout:
              milliseconds: !input multi_click_delay
            continue_on_timeout: true
          
          - choose:
              # Zweiter Klick erkannt
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none }}"
                sequence:
                  # Warte auf dritten Klick
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input hue_button
                        attribute: event_type
                        to: "short_release"
                    timeout:
                      milliseconds: !input multi_click_delay
                    continue_on_timeout: true
                  
                  - choose:
                      # Dreifachklick
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is not none }}"
                        sequence: !input triple_click_action
                    # Doppelklick
                    default: !input double_click_action
            # Einzelklick
            default: !input single_click_action
      
      # Option 2: Repeat - Dimmen (solange Taste gedrückt)
      - conditions:
          - condition: template
            value_template: "{{ event_type == 'repeat' }}"
          - condition: template
            value_template: "{{ lights_on | count > 0 }}"
        sequence:
          - if:
              - condition: state
                entity_id: !input dim_direction_helper
                state: "off"
            then:
              # Richtung umschalten und hochdimmen
              - service: input_boolean.turn_on
                target:
                  entity_id: !input dim_direction_helper
              - repeat:
                  while:
                    - condition: template
                      value_template: "{{ expand(lights_on) | map(attribute='attributes.brightness') | map('int') | select('lt', 255) | list | count > 0 }}"
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ lights_on }}"
                      data:
                        brightness_step: "{{ dim_speed_value }}"
                    - delay:
                        milliseconds: !input dim_delay
            else:
              # Richtung umschalten und runterdimmen
              - service: input_boolean.turn_off
                target:
                  entity_id: !input dim_direction_helper
              - repeat:
                  while:
                    - condition: template
                      value_template: "{{ expand(lights_on) | map(attribute='attributes.brightness') | map('int') | select('gt', 5) | list | count > 0 }}"
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ lights_on }}"
                      data:
                        brightness_step: "{{ -dim_speed_value }}"
                    - delay:
                        milliseconds: !input dim_delay

mode: restart
