                      target:
                        entity_id: "{{ button_2_lights_on }}"
                      data:
                        brightness_step: "{{ dim_speed_value }}"
                    - delay:
                        milliseconds: !input dim_delay
            else:
              - service: input_boolean.turn_off
                target:
                  entity_id: !input dim_direction_helper_2
              - repeat:
                  while:
                    - condition: template
